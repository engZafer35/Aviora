<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ofis Animasyonu - Top Down View</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #16213e;
  font-family: 'Segoe UI', sans-serif;
  overflow-x: hidden;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(22,33,62,0.96);
  border-bottom: 1px solid rgba(255,255,255,0.12);
}
.topbar-inner {
  max-width: 1150px;
  margin: 0 auto;
  padding: 12px 18px;
  display: flex;
  gap: 14px;
  align-items: center;
  justify-content: space-between;
}
.topbar .brand { font-weight: 700; color: #eaf0ff; }
.topbar .nav { display: flex; gap: 14px; flex-wrap: wrap; }
.topbar .nav a {
  padding: 6px 10px;
  border: 1px solid transparent;
  border-radius: 999px;
  color: #9fc4ff;
  text-decoration: none;
  font-size: 14px;
}
.topbar .nav a:hover { text-decoration: underline; }
.topbar .nav a.active {
  border-color: rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.07);
  color: #eaf0ff;
}
.canvas-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: calc(100vh - 52px);
  padding: 16px;
}
#office {
  border-radius: 8px;
  box-shadow: 0 0 80px rgba(0,0,0,0.6);
  image-rendering: auto;
}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">🛰️ Zafer Satılmış - Aviora</div>
    <nav class="nav">
      <a href="../index.html">Aviora</a>
      <a href="../fs/index.html">File System</a>
      <a href="../timeservice/index.html">TimeService</a>
      <a href="../network/index.html">Network</a>
      <a href="../display/index.html">Display</a>
      <a href="../sw_update/index.html">SW Update</a>
      <a href="index.html" class="active">Office</a>
    </nav>
  </div>
</div>
<div class="canvas-wrap">
<canvas id="office"></canvas>
</div>
<script>
const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');

const W = 1100, H = 820;
canvas.width = W;
canvas.height = H;

function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}
const srand = seededRandom(42);

const COL = {
  wallBrown: '#7A4E2D',
  wallDark: '#5C3A1F',
  wallLight: '#9B6B45',
  floorBase: '#9E6155',
  floorTile1: '#A8695D',
  floorTile2: '#946058',
  floorTile3: '#8B5850',
  divider: '#2B6A7A',
  dividerDark: '#1D4F5C',
  dividerTop: '#3C92A8',
  dividerAccent: '#245868',
  desk: '#C9AD82',
  deskDark: '#A89060',
  deskEdge: '#B59A6E',
  chair: '#3C3C3C',
  chairCushion: '#505050',
  monitorBody: '#1A1A1A',
  monitorScreen: '#3D7A96',
  screenGlow: '#5BA8C8',
};

const cubicles = [
  { x: 50,  y: 50,  w: 190, h: 195, openSide: 'bottom', deskSide: 'top',    id: 0 },
  { x: 250, y: 50,  w: 190, h: 195, openSide: 'bottom', deskSide: 'top',    id: 1 },
  { x: 450, y: 50,  w: 190, h: 195, openSide: 'bottom', deskSide: 'top',    id: 2 },
  { x: 50,  y: 475, w: 190, h: 195, openSide: 'top',    deskSide: 'bottom', id: 3 },
  { x: 250, y: 475, w: 190, h: 195, openSide: 'top',    deskSide: 'bottom', id: 4 },
  { x: 450, y: 475, w: 190, h: 195, openSide: 'top',    deskSide: 'bottom', id: 5 },
];

const CORRIDOR_Y_TOP = 250;
const CORRIDOR_Y_BOTTOM = 470;
const CORRIDOR_CENTER_Y = (CORRIDOR_Y_TOP + CORRIDOR_Y_BOTTOM) / 2;

const cubicleHasPlant = cubicles.map(() => srand() > 0.35);
const cubicleHasCup = cubicles.map(() => srand() > 0.4);
const cubicleHasBooks = cubicles.map(() => srand() > 0.5);
const bookWidths = [];
for (let i = 0; i < 50; i++) bookWidths.push(4 + srand() * 6);

const HAIR = ['#2C1B0E','#8B6914','#B8652A','#1A0E05','#5C3020','#D4A056','#4A3520','#6B3A2A'];
const SHIRT = ['#3B6DAA','#AA3B50','#4A9960','#B08530','#7050A8','#4898A8','#CC7744','#5C40A0'];
const PANTS = ['#2A2A3A','#333344','#2E2E2E','#383848','#303040','#2C2C38','#343434','#2E2E3E'];
const SKIN = ['#F5D0A9','#E5BD8E','#D4A97A','#C49060','#B07850','#EFDBCB','#E0C49B','#C8956A'];

class Character {
  constructor(cub, idx) {
    this.idx = idx;
    this.cub = cub;

    this.hairColor = HAIR[idx % HAIR.length];
    this.shirtColor = SHIRT[idx % SHIRT.length];
    this.pantsColor = PANTS[idx % PANTS.length];
    this.skinColor = SKIN[idx % SKIN.length];
    this.hasGlasses = idx === 1 || idx === 4;

    if (cub.deskSide === 'top') {
      this.homeX = cub.x + cub.w / 2;
      this.homeY = cub.y + cub.h - 55;
      this.faceDir = 'up';
    } else {
      this.homeX = cub.x + cub.w / 2;
      this.homeY = cub.y + 55;
      this.faceDir = 'down';
    }

    this.x = this.homeX;
    this.y = this.homeY;
    this.state = 'sitting';
    this.stateTimer = 120 + srand() * 350;
    this.walkPath = [];
    this.walkIdx = 0;
    this.speed = 1.0 + srand() * 0.5;
    this.frame = Math.floor(srand() * 1000);
    this.moveDir = 0;
    this.bob = 0;
    this.standTransition = 0;
  }

  update() {
    this.frame++;

    switch (this.state) {
      case 'sitting':
        this.stateTimer--;
        if (this.stateTimer <= 0) {
          this.state = 'standing_up';
          this.stateTimer = 40;
          this.standTransition = 0;
        }
        break;

      case 'standing_up':
        this.standTransition = Math.min(1, this.standTransition + 0.04);
        this.stateTimer--;
        if (this.stateTimer <= 0) {
          this.state = 'walking';
          this._genPath();
        }
        break;

      case 'walking':
        this._walk();
        break;

      case 'idle':
        this.stateTimer--;
        this.bob = 0;
        if (this.stateTimer <= 0) {
          this.state = 'returning';
          this.walkPath = [{ x: this.homeX, y: this.homeY }];
          this.walkIdx = 0;
        }
        break;

      case 'returning':
        this._walk();
        if (this.walkIdx >= this.walkPath.length) {
          this.x = this.homeX;
          this.y = this.homeY;
          this.state = 'sitting_down';
          this.stateTimer = 35;
          this.standTransition = 1;
          this.bob = 0;
        }
        return;

      case 'sitting_down':
        this.standTransition = Math.max(0, this.standTransition - 0.04);
        this.stateTimer--;
        if (this.stateTimer <= 0) {
          this.state = 'sitting';
          this.stateTimer = 180 + srand() * 400;
          this.standTransition = 0;
        }
        break;
    }
  }

  _walk() {
    if (this.walkIdx >= this.walkPath.length) {
      this.state = 'idle';
      this.stateTimer = 50 + srand() * 150;
      this.bob = 0;
      return;
    }
    const t = this.walkPath[this.walkIdx];
    const dx = t.x - this.x;
    const dy = t.y - this.y;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < 2.5) {
      this.walkIdx++;
    } else {
      this.moveDir = Math.atan2(dy, dx);
      this.x += (dx / d) * this.speed;
      this.y += (dy / d) * this.speed;
      this.bob = Math.sin(this.frame * 0.18) * 2.5;
    }
  }

  _genPath() {
    const path = [];
    const n = 1 + Math.floor(srand() * 3);
    for (let i = 0; i < n; i++) {
      path.push({
        x: 80 + srand() * 560,
        y: CORRIDOR_Y_TOP + 20 + srand() * (CORRIDOR_Y_BOTTOM - CORRIDOR_Y_TOP - 40)
      });
    }
    this.walkPath = path;
    this.walkIdx = 0;
  }

  get isSitting() {
    return this.state === 'sitting';
  }

  get isBusy() {
    return this.state === 'sitting' || this.state === 'sitting_down' || this.state === 'standing_up';
  }

  get isAtDesk() {
    return this.state === 'sitting' || this.state === 'sitting_down' || this.state === 'standing_up';
  }

  draw() {
    ctx.save();
    ctx.translate(this.x, this.y + this.bob);

    if (this.isAtDesk && this.standTransition < 0.5) {
      this._drawSitting();
    } else {
      this._drawStanding();
    }

    this._drawIcon();
    ctx.restore();
  }

  _drawSitting() {
    ctx.fillStyle = this.shirtColor;
    ctx.beginPath();
    ctx.ellipse(0, 3, 11, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = _darken(this.shirtColor, 30);
    ctx.lineWidth = 0.6;
    ctx.stroke();

    const typeOff = Math.sin(this.frame * 0.25) * 2;
    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    ctx.roundRect(-14, -1 + typeOff, 6, 4, 1);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(8, -1 - typeOff, 6, 4, 1);
    ctx.fill();

    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    ctx.arc(0, -9, 9, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = this.hairColor;
    ctx.beginPath();
    ctx.ellipse(0, -13, 8, 6, 0, Math.PI + 0.3, -0.3);
    ctx.fill();

    if (this.hasGlasses) {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(-4, -9, 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(4, -9, 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-1, -9);
      ctx.lineTo(1, -9);
      ctx.stroke();
    }
  }

  _drawStanding() {
    const wc = Math.sin(this.frame * 0.15);

    ctx.fillStyle = this.pantsColor;
    ctx.fillRect(-5, 8 + wc, 4, 11);
    ctx.fillRect(1, 8 - wc, 4, 11);

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.ellipse(-3, 19 + wc, 4, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(3, 19 - wc, 4, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = this.shirtColor;
    ctx.beginPath();
    ctx.ellipse(0, 1, 11, 11, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = _darken(this.shirtColor, 25);
    ctx.lineWidth = 0.6;
    ctx.stroke();

    const as = Math.sin(this.frame * 0.15) * 5;
    ctx.fillStyle = this.skinColor;
    ctx.fillRect(-15, -3 + as, 5, 11);
    ctx.fillRect(10, -3 - as, 5, 11);

    ctx.fillStyle = this.skinColor;
    ctx.beginPath();
    ctx.arc(0, -13, 9, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = this.hairColor;
    ctx.beginPath();
    ctx.ellipse(0, -17, 8, 6, 0, Math.PI + 0.3, -0.3);
    ctx.fill();

    if (this.hasGlasses) {
      ctx.strokeStyle = '#666';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.arc(-4, -13, 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(4, -13, 3, 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-1, -13);
      ctx.lineTo(1, -13);
      ctx.stroke();
    }
  }

  _drawIcon() {
    const baseY = this.isAtDesk ? -28 : -34;
    const pulse = Math.sin(this.frame * 0.06) * 2;
    const iy = baseY + pulse;
    const busy = this.isBusy;

    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    ctx.arc(0, iy, 11, 0, Math.PI * 2);
    ctx.fillStyle = busy ? '#FF3333' : '#33DD33';
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.beginPath();
    ctx.arc(0, iy, 7, 0, Math.PI * 2);
    ctx.fillStyle = busy ? '#DD3333' : '#33CC33';
    ctx.fill();
    ctx.strokeStyle = busy ? '#FF6666' : '#66FF66';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.fillStyle = '#FFF';
    ctx.strokeStyle = '#FFF';
    ctx.lineWidth = 2;
    if (busy) {
      ctx.beginPath();
      ctx.moveTo(-3, iy - 3);
      ctx.lineTo(3, iy + 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(3, iy - 3);
      ctx.lineTo(-3, iy + 3);
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.moveTo(-3, iy);
      ctx.lineTo(-1, iy + 3);
      ctx.lineTo(4, iy - 3);
      ctx.stroke();
    }
  }
}

function _darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  r = Math.max(0,r); g = Math.max(0,g); b = Math.max(0,b);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

// ──────── STATIC SCENE (pre-rendered to offscreen canvas) ────────
let staticCanvas;

function buildStaticScene() {
  staticCanvas = document.createElement('canvas');
  staticCanvas.width = W;
  staticCanvas.height = H;
  const sc = staticCanvas.getContext('2d');

  drawFloor(sc);
  drawWalls(sc);
  drawCorridor(sc);
  cubicles.forEach(c => drawCubicle(sc, c));
  drawAllOfficeItems(sc);
}

function drawFloor(c) {
  c.fillStyle = COL.floorBase;
  c.fillRect(18, 18, W - 36, H - 36);

  for (let x = 18; x < W - 18; x += 40) {
    for (let y = 18; y < H - 18; y += 40) {
      const shade = ((Math.floor(x/40) + Math.floor(y/40)) % 2 === 0) ? COL.floorTile1 : COL.floorTile2;
      c.fillStyle = shade;
      c.fillRect(x, y, 40, 40);
      c.strokeStyle = COL.floorTile3;
      c.lineWidth = 0.3;
      c.strokeRect(x, y, 40, 40);
    }
  }

  c.fillStyle = 'rgba(0,0,0,0.02)';
  for (let x = 18; x < W - 18; x += 80) {
    for (let y = 18; y < H - 18; y += 80) {
      if ((Math.floor(x/80)+Math.floor(y/80))%3===0) c.fillRect(x,y,40,40);
    }
  }
}

function drawWalls(c) {
  const wt = 18;

  c.fillStyle = COL.wallBrown;
  c.fillRect(0, 0, W, wt);
  c.fillRect(0, 0, wt, H);
  c.fillRect(W - wt, 0, wt, H);
  c.fillRect(0, H - wt, W, wt);

  c.fillStyle = COL.wallDark;
  c.fillRect(0, 0, W, 5);
  c.fillRect(0, 0, 5, H);
  c.fillRect(W - 5, 0, 5, H);
  c.fillRect(0, H - 5, W, 5);

  c.fillStyle = COL.wallLight;
  c.fillRect(5, wt - 3, W - 10, 3);
  c.fillRect(wt - 3, 5, 3, H - 10);
  c.fillRect(W - wt, 5, 3, H - 10);
  c.fillRect(5, H - wt, W - 10, 3);

  for (let x = 40; x < W - 30; x += 60) {
    c.fillStyle = COL.wallDark;
    c.fillRect(x, 2, 30, 4);
  }
  for (let y = 40; y < H - 30; y += 60) {
    c.fillStyle = COL.wallDark;
    c.fillRect(2, y, 4, 30);
  }

  drawWindows(c);
  drawBulletinBoards(c);
  drawWallDecorations(c);
}

function drawWindows(c) {
  const wins = [
    { x: W - 16, y: 70,  h: 70 },
    { x: W - 16, y: 180, h: 70 },
    { x: W - 16, y: 490, h: 70 },
    { x: W - 16, y: 600, h: 70 },
  ];
  wins.forEach(w => {
    c.fillStyle = '#88CCEE';
    c.fillRect(w.x, w.y, 12, w.h);
    c.strokeStyle = '#CCCCCC';
    c.lineWidth = 2;
    c.strokeRect(w.x, w.y, 12, w.h);
    c.beginPath();
    c.moveTo(w.x + 6, w.y);
    c.lineTo(w.x + 6, w.y + w.h);
    c.moveTo(w.x, w.y + w.h / 2);
    c.lineTo(w.x + 12, w.y + w.h / 2);
    c.strokeStyle = '#DDD';
    c.lineWidth = 1;
    c.stroke();

    const g = c.createLinearGradient(w.x, w.y, w.x + 12, w.y + w.h);
    g.addColorStop(0, 'rgba(255,255,255,0.35)');
    g.addColorStop(0.6, 'rgba(255,255,255,0)');
    c.fillStyle = g;
    c.fillRect(w.x, w.y, 12, w.h);

    c.fillStyle = '#4A8B40';
    c.fillRect(w.x + 1, w.y + w.h - 10, 10, 10);
    c.fillStyle = '#5AA050';
    c.fillRect(w.x + 2, w.y + w.h - 8, 8, 6);
  });

  const topWins = [
    { y: 3, x: 700, w: 70 },
    { y: 3, x: 820, w: 70 },
  ];
  topWins.forEach(w => {
    c.fillStyle = '#88CCEE';
    c.fillRect(w.x, w.y, w.w, 12);
    c.strokeStyle = '#CCC';
    c.lineWidth = 2;
    c.strokeRect(w.x, w.y, w.w, 12);
    const g = c.createLinearGradient(w.x, w.y, w.x + w.w, w.y + 12);
    g.addColorStop(0, 'rgba(255,255,255,0.3)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = g;
    c.fillRect(w.x, w.y, w.w, 12);
  });
}

function drawBulletinBoards(c) {
  const boards = [
    { x: 180, y: 2, w: 90, h: 14, orient: 'h' },
    { x: 420, y: 2, w: 90, h: 14, orient: 'h' },
    { x: 2,   y: 200, w: 14, h: 80, orient: 'v' },
    { x: W-16, y: 320, w: 14, h: 80, orient: 'v' },
  ];
  const sColors = ['#FFFF77','#77FF77','#FF7777','#77BBFF','#FFBB77','#FF77FF'];
  boards.forEach((b, bi) => {
    c.fillStyle = '#C4A060';
    c.fillRect(b.x, b.y, b.w, b.h);
    c.strokeStyle = '#8B6B3A';
    c.lineWidth = 1.5;
    c.strokeRect(b.x, b.y, b.w, b.h);

    const isH = b.orient === 'h';
    const count = isH ? 5 : 4;
    for (let i = 0; i < count; i++) {
      c.fillStyle = sColors[(bi * 3 + i) % sColors.length];
      if (isH) {
        c.fillRect(b.x + 4 + i * 16, b.y + 3, 12, 8);
      } else {
        c.fillRect(b.x + 3, b.y + 5 + i * 18, 8, 14);
      }
    }
  });
}

function drawWallDecorations(c) {
  c.fillStyle = '#E8D8C0';
  c.fillRect(310, 2, 70, 14);
  c.strokeStyle = '#A08050';
  c.lineWidth = 1;
  c.strokeRect(310, 2, 70, 14);
  c.fillStyle = '#BB5533';
  c.font = 'bold 8px Arial';
  c.textAlign = 'center';
  c.fillText('PROFITS', 345, 12);
  c.textAlign = 'start';

  c.fillStyle = '#E0D0B0';
  c.fillRect(580, 2, 60, 14);
  c.strokeStyle = '#A08050';
  c.strokeRect(580, 2, 60, 14);
  c.fillStyle = '#336699';
  c.font = 'bold 7px Arial';
  c.textAlign = 'center';
  c.fillText('ACHIEVE', 610, 12);
  c.textAlign = 'start';

  c.fillStyle = '#EEE';
  c.fillRect(940, 2, 50, 14);
  c.strokeStyle = '#CCC';
  c.strokeRect(940, 2, 50, 14);
  c.fillStyle = '#888';
  c.beginPath();
  c.arc(965, 9, 4, 0, Math.PI * 2);
  c.fill();
}

function drawCorridor(c) {
  c.fillStyle = 'rgba(130,80,70,0.12)';
  c.fillRect(20, CORRIDOR_Y_TOP, W - 40, CORRIDOR_Y_BOTTOM - CORRIDOR_Y_TOP);
}

function drawCubicle(c, cub) {
  const dW = 7;
  const {x, y, w, h, openSide} = cub;

  c.fillStyle = 'rgba(0,0,0,0.04)';
  c.fillRect(x + 4, y + 4, w, h);

  if (openSide !== 'top')    drawDividerH(c, x, y, w, dW);
  if (openSide !== 'bottom') drawDividerH(c, x, y + h - dW, w, dW);
  if (openSide !== 'left')   drawDividerV(c, x, y, dW, h);
  if (openSide !== 'right')  drawDividerV(c, x + w - dW, y, dW, h);

  drawDesk(c, cub);
  drawChair(c, cub);
  drawMonitor(c, cub);
  drawCubicleAccessories(c, cub);
}

function drawDividerH(c, x, y, w, h) {
  c.fillStyle = COL.divider;
  c.fillRect(x, y, w, h);
  c.fillStyle = COL.dividerTop;
  c.fillRect(x, y, w, 2);
  c.fillStyle = COL.dividerAccent;
  c.fillRect(x, y + h - 1, w, 1);
}

function drawDividerV(c, x, y, w, h) {
  c.fillStyle = COL.divider;
  c.fillRect(x, y, w, h);
  c.fillStyle = COL.dividerTop;
  c.fillRect(x, y, 2, h);
  c.fillStyle = COL.dividerAccent;
  c.fillRect(x + w - 1, y, 1, h);
}

function drawDesk(c, cub) {
  let dx, dy, dw = cub.w - 50, dh = 65;
  if (cub.deskSide === 'top') {
    dx = cub.x + 25; dy = cub.y + 15;
  } else {

  const shelfH = h / 4;
  let bwIdx = 0;

const characters = cubicles.map((c, i) => new Character(c, i));

// ──────── ANIMATION LOOP ────────
buildStaticScene();

function render() {
  ctx.drawImage(staticCanvas, 0, 0);

  characters.forEach(ch => ch.update());

  const sorted = [...characters].sort((a, b) => a.y - b.y);
  sorted.forEach(ch => ch.draw());

  drawScreenGlow();
  drawLegend();

  requestAnimationFrame(render);
}

function drawScreenGlow() {
  const t = performance.now() * 0.001;
  cubicles.forEach(cub => {
    let mx, my;
    if (cub.deskSide === 'top') {
      mx = cub.x + cub.w / 2; my = cub.y + 38;
    } else {
      mx = cub.x + cub.w / 2; my = cub.y + cub.h - 38;
    }
    const flicker = 0.03 + Math.sin(t * 2 + cub.id * 1.5) * 0.015;
    ctx.fillStyle = `rgba(80,180,220,${flicker})`;
    ctx.beginPath();
    ctx.arc(mx, my, 30, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawLegend() {
  const lx = W - 210, ly = H - 65;

  ctx.beginPath();
  ctx.arc(lx + 20, ly + 16, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#FF6666';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(lx + 18, ly + 14);
  ctx.lineTo(lx + 22, ly + 18);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(lx + 22, ly + 14);
  ctx.lineTo(lx + 18, ly + 18);
  ctx.stroke();
  ctx.fillStyle = '#EEE';
  ctx.font = '12px Segoe UI, sans-serif';
  ctx.fillText('Meşgul (Masada)', lx + 35, ly + 20);

  ctx.fillStyle = 'rgba(50,200,50,0.9)';
  ctx.beginPath();
  ctx.arc(lx + 20, ly + 37, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#66FF66';
  ctx.lineWidth = 1;
